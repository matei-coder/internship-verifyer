# Configuration for the internship verifier.
#
# Each company has a "type" telling the checker how to fetch its postings:
#   - greenhouse / lever / ashby / smartrecruiters : public JSON API, needs `token`
#   - workday        : needs `base`, `tenant`, `site`
#   - amazon         : Amazon's public search.json, needs `queries` (list)
#   - google         : browser-scraped (Playwright), optional `query`
#   - microsoft      : browser-scraped (Playwright), optional `query`
#
# Tokens were auto-detected by scripts/detect_ats.py. To add a company, find its
# job board (boards.greenhouse.io/<token>, jobs.lever.co/<token>, etc.) or re-run
# the detector.

# Where to send the morning digest. Override with the EMAIL_TO secret/env if set.
recipient: mateimacqueen@gmail.com

# A posting counts as an "internship" if its title contains any of these
# (whole-word, case-insensitive).
keywords:
  - intern
  - interns
  - internship
  - internships
  - co-op
  - coop
  - "working student"
  - "new grad"
  - "new graduate"
  - "early career"
  - "early careers"
  - "early talent"
  - "university grad"
  - "graduate program"
  - "summer analyst"
  - "off-cycle"
  - apprentice
  - trainee
  - placement
  - "student researcher"

# Optional: only keep postings whose location contains one of these substrings
# (case-insensitive). Leave empty to accept every location.
locations: []

