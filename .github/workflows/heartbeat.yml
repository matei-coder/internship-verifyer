name: Heartbeat

# GitHub auto-disables scheduled workflows after 60 days with no repository
# activity. This makes a real commit twice a month so the daily checker never
# gets switched off.
#
# NOTE: a commit made with the default GITHUB_TOKEN does not always reset the
# 60-day timer. For a guaranteed effect, add a Personal Access Token as the
# secret HEARTBEAT_PAT (Settings > Developer settings > Fine-grained tokens,
# with "Contents: read and write" on this repo). If the secret is absent we
# fall back to the default token (best effort).

on:
  schedule:
    - cron: "0 5 1,15 * *"   # 1st and 15th of every month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.HEARTBEAT_PAT || secrets.GITHUB_TOKEN }}

      - name: Touch heartbeat file and commit
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git commit -m "Heartbeat: keep scheduled workflows alive [skip ci]" || exit 0
          git push
