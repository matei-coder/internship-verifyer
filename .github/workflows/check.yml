name: Internship check

on:
  schedule:
    # 06:00 Europe/Bucharest. GitHub cron is UTC; RO is UTC+3 (summer) / UTC+2 (winter).
    # 03:00 UTC ~= 06:00 RO in summer. Adjust if you prefer a different hour.
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Needed so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: internship-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m checker.main

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update internship state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
