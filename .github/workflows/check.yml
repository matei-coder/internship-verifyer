name: Internship check

on:
  schedule:
    # GitHub cron is UTC; RO is UTC+3 (summer) / UTC+2 (winter).
    # Two runs as a safety net — if one is delayed/skipped, the other covers it.
    # state.json dedupes, so you never get the same posting emailed twice.
    - cron: "0 3 * * *"    # ~06:00 RO (summer)
    - cron: "30 3 * * *"   # ~06:30 RO (summer) — backup
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Needed so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: internship-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m checker.main

      - name: Commit updated state
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update internship state [skip ci]"
          # Another run (or a manual push) may have moved main forward. Rebase
          # onto the latest, preferring our freshly-built state on any conflict,
          # then retry the push a few times.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected, syncing and retrying ($attempt)..."
            git pull --rebase -X ours origin main || git rebase --abort || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "Could not push state after retries." >&2
          exit 1
